<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Smart Library & Vocab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <style>
        :root { --bg: #fdfcf8; --accent: #3498db; --text: #2c3e50; --white: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        
        /* Navigasi Umum */
        .nav-bar { background: var(--white); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .btn { padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; }
        .btn-blue { background: var(--accent); color: white; border: none; font-weight: bold; }

        /* VIEW 1: RAK BUKU */
        #library-view { height: 100vh; overflow-y: auto; display: block; }
        .shelf-container { padding: 20px; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .book-card { cursor: pointer; text-align: center; }
        .book-cover { width: 100%; height: 200px; background: #eee; border-radius: 10px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* VIEW 2: MODE BACA */
        #reader-view { display: none; height: 100vh; flex-direction: column; background: white; }
        #viewer { flex: 1; width: 100%; height: 100%; }

        /* VIEW 3: FLASHCARD */
        #quiz-view { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .card { background: white; padding: 50px; border-radius: 20px; border: 2px solid var(--accent); width: 80%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* Popup Kamus */
        #dict-popup {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; width: 90%; max-width: 400px; padding: 20px;
            border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="library-view">
    <div class="nav-bar">
        <span style="font-size: 20px; font-weight: bold;">📚 Rak Bukuku</span>
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="showQuiz()">📚 Latihan Vocab</button>
            <button class="btn btn-blue" onclick="document.getElementById('file-upload').click()">+ Tambah</button>
        </div>
    </div>
    <input type="file" id="file-upload" accept=".epub" style="display:none" onchange="addBook(this)">
    <div class="shelf-container">
        <div class="book-grid" id="book-grid"></div>
    </div>
</div>

<div id="reader-view">
    <header class="nav-bar">
        <button class="btn" onclick="showLibrary()">⬅️ Kembali</button>
        <div id="reader-title" style="font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 150px;">Judul Buku</div>
        <div style="display: flex; gap: 5px;">
            <button class="btn" onclick="rendition.prev()">Prev</button>
            <button class="btn" onclick="rendition.next()">Next</button>
        </div>
    </header>
    <div id="viewer"></div>
</div>

<div id="quiz-view">
    <h2 style="margin-bottom: 20px;">Hafalan Kosa Kata</h2>
    <div class="card">
        <h1 id="q-word" style="font-size: 32px; margin: 0;">---</h1>
        <p id="q-meaning" style="display:none; color: var(--accent); font-size: 24px; margin-top: 20px; font-weight: bold;"></p>
    </div>
    <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button class="btn" onclick="document.getElementById('q-meaning').style.display='block'">Cek Arti</button>
        <button class="btn btn-blue" onclick="nextQ()">Kata Acak</button>
        <button class="btn" onclick="showLibrary()">Selesai</button>
    </div>
</div>

<div id="dict-popup">
    <div style="font-size: 20px; font-weight: bold; color: var(--accent);" id="pop-word">Word</div>
    <div style="margin: 10px 0; color: #555;" id="pop-meaning">Mencari...</div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-blue" style="flex: 2;" onclick="saveVocab()">Simpan ke Flashcard</button>
        <button class="btn" style="flex: 1;" onclick="closePopup()">Tutup</button>
    </div>
</div>

<script>
    let book, rendition, currentWord, currentMeaning;

    // 1. LIBRARY LOGIC
    async function addBook(input) {
        const file = input.files[0];
        if (!file) return;

        const tempBook = ePub(file);
        const title = file.name.replace('.epub', '');
        let coverUrl = "https://via.placeholder.com/150x200?text=No+Cover";
        
        try { coverUrl = await tempBook.coverUrl(); } catch (e) {}

        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `<img class="book-cover" src="${coverUrl || 'https://via.placeholder.com/150x200?text=No+Cover'}"><div style="font-size:12px; margin-top:5px; font-weight:600;">${title}</div>`;
        card.onclick = () => openBook(file, title);
        document.getElementById('book-grid').appendChild(card);
    }

    // 2. READER LOGIC
    function openBook(file, title) {
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'flex';
        document.getElementById('reader-title').innerText = title;

        if (book) book.destroy();
        book = ePub(file);
        rendition = book.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated", manager: "default" });
        rendition.display();

        // Control Setup
        const checkLayout = () => rendition.spread(window.innerWidth > window.innerHeight ? "always" : "none");
        window.onresize = checkLayout;
        checkLayout();

        rendition.on("touchstart", (e) => { this.startTime = Date.now(); });
        rendition.on("touchend", (e) => {
            if (Date.now() - this.startTime < 200 && document.getElementById('dict-popup').style.display !== 'block') {
                rendition.next();
            }
        });

        rendition.on("selected", async (cfiRange, contents) => {
            const text = contents.window.getSelection().toString().trim();
            if (text && text.length < 50) {
                currentWord = text;
                showTranslate(text);
                contents.window.getSelection().removeAllRanges();
            }
        });
    }

    // 3. TRANSLATE & VOCAB LOGIC
    async function showTranslate(text) {
        const popup = document.getElementById('dict-popup');
        document.getElementById('pop-word').innerText = text;
        document.getElementById('pop-meaning').innerText = "Mencari...";
        popup.style.display = 'block';

        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|id`);
            const data = await res.json();
            currentMeaning = data.responseData.translatedText;
            document.getElementById('pop-meaning').innerText = currentMeaning;
        } catch (e) { document.getElementById('pop-meaning').innerText = "Butuh internet."; }
    }

    function saveVocab() {
        let db = JSON.parse(localStorage.getItem('my_vocab_list') || "[]");
        if(!db.find(x => x.w === currentWord)) {
            db.push({ w: currentWord, m: currentMeaning });
            localStorage.setItem('my_vocab_list', JSON.stringify(db));
            alert("Tersimpan!");
        }
        closePopup();
    }

    // 4. FLASHCARD LOGIC
    function showQuiz() {
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'flex';
        nextQ();
    }

    function nextQ() {
        let db = JSON.parse(localStorage.getItem('my_vocab_list') || "[]");
        if(db.length === 0) { document.getElementById('q-word').innerText = "Belum ada kata"; return; }
        let item = db[Math.floor(Math.random() * db.length)];
        document.getElementById('q-word').innerText = item.w;
        document.getElementById('q-meaning').innerText = item.m;
        document.getElementById('q-meaning').style.display = 'none';
    }

    // Navigasi Umum
    function showLibrary() {
        document.getElementById('library-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'none';
    }
    function closePopup() { document.getElementById('dict-popup').style.display = 'none'; }
</script>
</body>
</html>
